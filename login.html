<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 欢迎</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-bg: #0a1628;
            --secondary-bg: #0f1f35;
            --accent: #ff6b35;
            --accent-hover: #ff8555;
            --text-primary: #fef7e2;
            --text-secondary: #a8b5c7;
            --border: rgba(168, 181, 199, 0.15);
            --error: #e74c3c;
            --success: #27ae60;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--primary-bg);
            min-height: 100vh;
            overflow-x: hidden;
            color: var(--text-primary);
        }

        .noise-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0.03;
            z-index: 1;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        }

        .container {
            min-height: 100vh;
            display: grid;
            grid-template-columns: 1fr 1fr;
            position: relative;
            z-index: 2;
        }

        /* 左侧装饰区 */
        .decorative-side {
            position: relative;
            padding: 4rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background: linear-gradient(135deg, var(--primary-bg) 0%, var(--secondary-bg) 100%);
            overflow: hidden;
        }

        .decorative-side::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -30%;
            width: 80%;
            height: 200%;
            background: radial-gradient(ellipse at center, rgba(255, 107, 53, 0.08) 0%, transparent 70%);
            pointer-events: none;
        }

        .brand {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .brand-icon {
            width: 32px;
            height: 32px;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
        }

        .hero-text {
            position: relative;
            z-index: 2;
        }

        .hero-text h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3rem, 6vw, 5rem);
            font-weight: 900;
            line-height: 0.95;
            letter-spacing: -0.03em;
            margin-bottom: 1.5rem;
        }

        .hero-text h1 span {
            color: var(--accent);
            font-style: italic;
        }

        .hero-text p {
            font-size: 1.125rem;
            color: var(--text-secondary);
            line-height: 1.7;
            max-width: 400px;
            margin-bottom: 2rem;
        }

        .geometric-decoration {
            position: absolute;
            bottom: 4rem;
            left: 4rem;
            display: flex;
            gap: 1rem;
            align-items: flex-end;
        }

        .geo-shape {
            position: absolute;
            border: 1px solid rgba(168, 181, 199, 0.1);
        }

        .geo-shape-1 {
            width: 120px;
            height: 120px;
            bottom: 10%;
            left: 10%;
            transform: rotate(15deg);
            animation: float 8s ease-in-out infinite;
        }

        .geo-shape-2 {
            width: 80px;
            height: 80px;
            bottom: 25%;
            left: 20%;
            border-color: rgba(255, 107, 53, 0.2);
            transform: rotate(-10deg);
            animation: float 10s ease-in-out infinite 1s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(15deg); }
            50% { transform: translateY(-20px) rotate(20deg); }
        }

        @keyframes float2 {
            0%, 100% { transform: translateY(0) rotate(-10deg); }
            50% { transform: translateY(-15px) rotate(-5deg); }
        }

        /* 右侧登录区 */
        .login-side {
            position: relative;
            padding: 4rem;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--primary-bg);
        }

        .login-side::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 300px;
            height: 300px;
            background: linear-gradient(225deg, rgba(255, 107, 53, 0.05) 0%, transparent 70%);
            pointer-events: none;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 2;
        }

        .login-header {
            margin-bottom: 2.5rem;
            animation: fadeInUp 0.6s ease-out;
        }

        .login-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
        }

        .login-header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .login-header p a {
            color: var(--accent);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .login-header p a:hover {
            color: var(--accent-hover);
        }

        /* 社交登录 */
        .social-login {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            animation: fadeInUp 0.6s ease-out 0.1s backwards;
        }

        .social-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.875rem 1rem;
            background: var(--secondary-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .social-btn:hover {
            background: rgba(255, 107, 53, 0.1);
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .social-btn svg {
            width: 20px;
            height: 20px;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
            animation: fadeInUp 0.6s ease-out 0.2s backwards;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .divider-text {
            color: var(--text-secondary);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        /* 表单 */
        .login-form {
            animation: fadeInUp 0.6s ease-out 0.3s backwards;
        }

        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
            letter-spacing: 0.02em;
        }

        .form-input {
            width: 100%;
            padding: 1rem 1rem 1rem 2.875rem;
            background: var(--secondary-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(255, 107, 53, 0.1);
        }

        .form-input.error {
            border-color: var(--error);
        }

        .form-input::placeholder {
            color: rgba(168, 181, 199, 0.5);
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            top: calc(50% + 0.25rem);
            transform: translateY(-50%);
            color: var(--text-secondary);
            pointer-events: none;
            transition: color 0.3s ease;
        }

        .form-input:focus ~ .input-icon {
            color: var(--accent);
        }

        .password-toggle {
            position: absolute;
            right: 1rem;
            top: calc(50% + 0.25rem);
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 0.25rem;
            transition: color 0.3s ease;
        }

        .password-toggle:hover {
            color: var(--text-primary);
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            color: var(--text-secondary);
        }

        .remember-me input[type="checkbox"] {
            display: none;
        }

        .checkmark {
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .remember-me input[type="checkbox"]:checked ~ .checkmark {
            background: var(--accent);
            border-color: var(--accent);
        }

        .checkmark svg {
            width: 12px;
            height: 12px;
            stroke: white;
            opacity: 0;
            transform: scale(0);
            transition: all 0.2s ease;
        }

        .remember-me input[type="checkbox"]:checked ~ .checkmark svg {
            opacity: 1;
            transform: scale(1);
        }

        .forgot-password {
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .forgot-password:hover {
            color: var(--accent);
        }

        .submit-btn {
            width: 100%;
            padding: 1rem;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s ease, height 0.6s ease;
        }

        .submit-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 107, 53, 0.3);
        }

        .submit-btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .error-message {
            color: var(--error);
            font-size: 0.75rem;
            margin-top: 0.5rem;
            display: none;
        }

        .error-message.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .submit-btn.loading .btn-text {
            display: none;
        }

        .submit-btn.loading .loading-spinner {
            display: block;
            margin: 0 auto;
        }

        /* 装饰元素 */
        .corner-decoration {
            position: absolute;
            width: 60px;
            height: 60px;
            border: 1px solid rgba(255, 107, 53, 0.2);
        }

        .corner-decoration.top-left {
            top: 2rem;
            left: 2rem;
            border-right: none;
            border-bottom: none;
        }

        .corner-decoration.bottom-right {
            bottom: 2rem;
            right: 2rem;
            border-left: none;
            border-top: none;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* 响应式设计 */
        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
            }

            .decorative-side {
                padding: 2rem;
                min-height: 40vh;
            }

            .hero-text h1 {
                font-size: 2.5rem;
            }

            .geometric-decoration {
                display: none;
            }

            .login-side {
                padding: 2rem;
            }

            .login-container {
                max-width: 100%;
            }
        }

        @media (max-width: 480px) {
            .decorative-side,
            .login-side {
                padding: 1.5rem;
            }

            .social-login {
                flex-direction: column;
            }

            .hero-text h1 {
                font-size: 2rem;
            }
        }

        /* 无障碍优化 */
        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        .form-input:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        .submit-btn:focus-visible,
        .social-btn:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        /* 成功状态 */
        .success-message {
            display: none;
            text-align: center;
            padding: 2rem;
            animation: fadeIn 0.5s ease;
        }

        .success-message.show {
            display: block;
        }

        .success-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 1.5rem;
            background: var(--success);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: scaleIn 0.5s ease;
        }

        @keyframes scaleIn {
            from {
                transform: scale(0);
            }
            to {
                transform: scale(1);
            }
        }

        .success-message h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
        }

        .success-message p {
            color: var(--text-secondary);
        }

        .login-content {
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .login-content.hidden {
            opacity: 0;
            transform: translateY(20px);
            pointer-events: none;
            position: absolute;
        }
    </style>
</head>
<body>
    <div class="noise-overlay"></div>

    <div class="container">
        <!-- 左侧装饰区 -->
        <div class="decorative-side">
            <div class="corner-decoration top-left"></div>

            <div class="brand">
                <div class="brand-icon">W</div>
                <span>WELCOME</span>
            </div>

            <div class="hero-text">
                <h1>Welcome<br><span>Back.</span></h1>
                <p>登录您的账户，继续探索无限可能。我们已准备好为您提供卓越的体验。</p>
            </div>

            <div class="geometric-decoration">
                <div class="geo-shape geo-shape-1"></div>
                <div class="geo-shape geo-shape-2"></div>
            </div>
        </div>

        <!-- 右侧登录区 -->
        <div class="login-side">
            <div class="corner-decoration bottom-right"></div>

            <div class="login-container">
                <div class="login-content" id="loginContent">
                    <div class="login-header">
                        <h2>登录</h2>
                        <p>还没有账户？<a href="#" id="switchToRegister">立即注册</a></p>
                    </div>

                    <div class="social-login">
                        <button type="button" class="social-btn" aria-label="使用 Google 登录">
                            <svg viewBox="0 0 24 24" fill="currentColor">
                                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                            </svg>
                            Google
                        </button>
                        <button type="button" class="social-btn" aria-label="使用 GitHub 登录">
                            <svg viewBox="0 0 24 24" fill="currentColor">
                                <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                            </svg>
                            GitHub
                        </button>
                    </div>

                    <div class="divider">
                        <span class="divider-line"></span>
                        <span class="divider-text">或使用邮箱登录</span>
                        <span class="divider-line"></span>
                    </div>

                    <form class="login-form" id="loginForm" novalidate>
                        <div class="form-group">
                            <label for="email" class="form-label">邮箱地址</label>
                            <input
                                type="email"
                                id="email"
                                class="form-input"
                                placeholder="your@email.com"
                                aria-describedby="emailError"
                                required
                            >
                            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                                <polyline points="22,6 12,13 2,6"/>
                            </svg>
                            <div class="error-message" id="emailError">请输入有效的邮箱地址</div>
                        </div>

                        <div class="form-group">
                            <label for="password" class="form-label">密码</label>
                            <input
                                type="password"
                                id="password"
                                class="form-input"
                                placeholder="••••••••"
                                aria-describedby="passwordError"
                                required
                            >
                            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                            </svg>
                            <button type="button" class="password-toggle" id="passwordToggle" aria-label="显示/隐藏密码">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="eyeIcon">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                    <circle cx="12" cy="12" r="3"/>
                                </svg>
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="eyeOffIcon" style="display: none;">
                                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                                    <line x1="1" y1="1" x2="23" y2="23"/>
                                </svg>
                            </button>
                            <div class="error-message" id="passwordError">密码至少需要6个字符</div>
                        </div>

                        <div class="form-options">
                            <label class="remember-me">
                                <input type="checkbox" id="rememberMe">
                                <span class="checkmark">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                                        <polyline points="20 6 9 17 4 12"/>
                                    </svg>
                                </span>
                                记住我
                            </label>
                            <a href="#" class="forgot-password">忘记密码？</a>
                        </div>

                        <button type="submit" class="submit-btn" id="submitBtn">
                            <span class="btn-text">登录</span>
                            <div class="loading-spinner"></div>
                        </button>
                    </form>
                </div>

                <!-- 成功状态 -->
                <div class="success-message" id="successMessage">
                    <div class="success-icon">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3">
                            <polyline points="20 6 9 17 4 12"/>
                        </svg>
                    </div>
                    <h3>登录成功！</h3>
                    <p>正在跳转到首页...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // DOM 元素
        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const passwordToggle = document.getElementById('passwordToggle');
        const eyeIcon = document.getElementById('eyeIcon');
        const eyeOffIcon = document.getElementById('eyeOffIcon');
        const submitBtn = document.getElementById('submitBtn');
        const loginContent = document.getElementById('loginContent');
        const successMessage = document.getElementById('successMessage');
        const emailError = document.getElementById('emailError');
        const passwordError = document.getElementById('passwordError');

        // 邮箱验证
        function validateEmail(email) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        }

        // 密码验证
        function validatePassword(password) {
            return password.length >= 6;
        }

        // 显示错误
        function showError(input, errorElement) {
            input.classList.add('error');
            errorElement.classList.add('show');
        }

        // 隐藏错误
        function hideError(input, errorElement) {
            input.classList.remove('error');
            errorElement.classList.remove('show');
        }

        // 实时验证
        emailInput.addEventListener('input', function() {
            if (this.value && !validateEmail(this.value)) {
                showError(this, emailError);
            } else {
                hideError(this, emailError);
            }
        });

        passwordInput.addEventListener('input', function() {
            if (this.value && !validatePassword(this.value)) {
                showError(this, passwordError);
            } else {
                hideError(this, passwordError);
            }
        });

        // 密码显示/隐藏切换
        passwordToggle.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);

            if (type === 'text') {
                eyeIcon.style.display = 'none';
                eyeOffIcon.style.display = 'block';
            } else {
                eyeIcon.style.display = 'block';
                eyeOffIcon.style.display = 'none';
            }
        });

        // 表单提交
        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();

            let isValid = true;

            // 验证邮箱
            if (!emailInput.value || !validateEmail(emailInput.value)) {
                showError(emailInput, emailError);
                isValid = false;
            }

            // 验证密码
            if (!passwordInput.value || !validatePassword(passwordInput.value)) {
                showError(passwordInput, passwordError);
                isValid = false;
            }

            if (!isValid) {
                return;
            }

            // 显示加载状态
            submitBtn.classList.add('loading');
            submitBtn.disabled = true;

            // 模拟登录请求
            await new Promise(resolve => setTimeout(resolve, 2000));

            // 显示成功状态
            loginContent.classList.add('hidden');
            successMessage.classList.add('show');

            // 模拟跳转
            setTimeout(() => {
                alert('登录成功！实际应用中这里会跳转到首页');
                // 重置表单
                loginForm.reset();
                loginContent.classList.remove('hidden');
                successMessage.classList.remove('show');
                submitBtn.classList.remove('loading');
                submitBtn.disabled = false;
            }, 2000);
        });

        // 输入框聚焦效果
        document.querySelectorAll('.form-input').forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.classList.add('focused');
            });

            input.addEventListener('blur', function() {
                this.parentElement.classList.remove('focused');
            });
        });

        // 社交登录按钮点击（示例）
        document.querySelectorAll('.social-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const provider = this.textContent.trim();
                console.log(`使用 ${provider} 登录`);
                // 实际应用中这里会跳转到 OAuth 授权页面
            });
        });
    </script>
</body>
</html>
